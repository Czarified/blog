baseURL = 'https://eczarified.github.io/blog/'
locale = 'en-us'
title = 'My New Hugo Project'
relativeURLs = true
canonifyURLs = false

[params]
  author = 'Benjamin Crews'
  description = 'The personal blog of Benjamin Crews.'
  motto = 'Bloggy McBlogFace'
  authorimage = 'images/hero.jpg'

[module]
  [[module.imports]]
    path = 'tailbliss'
    [[module.imports.mounts]]
      source = 'archetypes'
      target = 'archetypes'
    [[module.imports.mounts]]
      source = 'assets'
      target = 'assets'
    [[module.imports.mounts]]
      source = 'data'
      target = 'data'
    [[module.imports.mounts]]
      source = 'i18n'
      target = 'i18n'
    [[module.imports.mounts]]
      source = 'layouts'
      target = 'layouts'
    [[module.imports.mounts]]
      source = 'static'
      target = 'static'

[menu]
  [[menu.main]]
    identifier = 'home'
    name = 'Home'
    url = '/'
    weight = 10
  [[menu.main]]
    identifier = 'posts'
    name = 'Posts'
    url = '/posts/'
    weight = 20

[caches]
  [caches.images]
    dir = ':cacheDir/images'

# Overrides the "Our Mission" block
[params.p1]
  heading = 'About This Site'
  image = 'images/hero.png'
  content = [
    { text = 'Welcome! I write about structural engineering, software development, and personal projects.' }
  ]

# Overrides or customizes the second section
[params.p2]
  heading = 'What I Working On'
  image = 'images/projects.png'
  content = [
    { text = 'Check out my latest blog posts below to see recent projects and tutorials.' }
  ]