baseURL = 'https://czarified.github.io/blog/'
locale = 'en-us'
title = 'Bloggy McBlogFace'
theme = 'tailbliss'
relativeURLs = true
canonifyURLs = false

[params]
  author = 'Benjamin Crews'
  moto = 'Blogging My Ass Off'
  description = 'The personal blog of Benjamin Crews.'
  authorimage = '/images/hero.jpg'
  og_image = '/images/tailbliss-cover.png'

